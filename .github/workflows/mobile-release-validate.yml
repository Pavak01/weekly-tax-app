name: Mobile Release Validate

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
    inputs:
      validate_target:
        description: Which config to validate
        required: true
        default: preview
      run_build:
        description: Run EAS build after validation (requires EXPO_TOKEN)
        required: true
        default: "false"
      build_profile:
        description: Build profile to use when run_build is true
        required: true
        default: preview
      platform:
        description: Platform to build when run_build is true
        required: true
        default: android

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile-release/package-lock.json

      - name: Install mobile-release dependencies
        working-directory: mobile-release
        run: npm ci

      - name: Preflight secret checks
        env:
          VALIDATE_TARGET: ${{ github.event.inputs.validate_target }}
          RAILWAY_PREVIEW_API_URL: ${{ secrets.RAILWAY_PREVIEW_API_URL }}
          IOS_BUNDLE_ID_PREVIEW: ${{ secrets.IOS_BUNDLE_ID_PREVIEW }}
          ANDROID_PACKAGE_PREVIEW: ${{ secrets.ANDROID_PACKAGE_PREVIEW }}
          RAILWAY_PRODUCTION_API_URL: ${{ secrets.RAILWAY_PRODUCTION_API_URL }}
          IOS_BUNDLE_ID_PRODUCTION: ${{ secrets.IOS_BUNDLE_ID_PRODUCTION }}
          ANDROID_PACKAGE_PRODUCTION: ${{ secrets.ANDROID_PACKAGE_PRODUCTION }}
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PROJECT_ID: ${{ secrets.EXPO_PROJECT_ID }}
          RUN_BUILD: ${{ github.event.inputs.run_build }}
        run: |
          set -euo pipefail

          check_not_empty () {
            local name="$1"
            local value="$2"
            if [ -z "$value" ]; then
              echo "Missing required GitHub secret: $name"
              exit 1
            fi
          }

          check_not_placeholder_url () {
            local name="$1"
            local value="$2"
            if echo "$value" | grep -Eiq 'example\\.com|localhost|127\\.0\\.0\\.1'; then
              echo "Secret $name is still a placeholder URL: $value"
              exit 1
            fi
          }

          check_not_placeholder_id () {
            local name="$1"
            local value="$2"
            if [ "$value" = "com.weeklytaxapp.mobile" ] || echo "$value" | grep -Eiq '^com\\.yourcompany\\.'; then
              echo "Secret $name is still a placeholder identifier: $value"
              exit 1
            fi
          }

          if [ "$VALIDATE_TARGET" = "preview" ] || [ "$VALIDATE_TARGET" = "both" ]; then
            check_not_empty "RAILWAY_PREVIEW_API_URL" "$RAILWAY_PREVIEW_API_URL"
            check_not_empty "IOS_BUNDLE_ID_PREVIEW" "$IOS_BUNDLE_ID_PREVIEW"
            check_not_empty "ANDROID_PACKAGE_PREVIEW" "$ANDROID_PACKAGE_PREVIEW"
            check_not_placeholder_url "RAILWAY_PREVIEW_API_URL" "$RAILWAY_PREVIEW_API_URL"
            check_not_placeholder_id "IOS_BUNDLE_ID_PREVIEW" "$IOS_BUNDLE_ID_PREVIEW"
            check_not_placeholder_id "ANDROID_PACKAGE_PREVIEW" "$ANDROID_PACKAGE_PREVIEW"
          fi

          if [ "$VALIDATE_TARGET" = "production" ] || [ "$VALIDATE_TARGET" = "both" ]; then
            check_not_empty "RAILWAY_PRODUCTION_API_URL" "$RAILWAY_PRODUCTION_API_URL"
            check_not_empty "IOS_BUNDLE_ID_PRODUCTION" "$IOS_BUNDLE_ID_PRODUCTION"
            check_not_empty "ANDROID_PACKAGE_PRODUCTION" "$ANDROID_PACKAGE_PRODUCTION"
            check_not_placeholder_url "RAILWAY_PRODUCTION_API_URL" "$RAILWAY_PRODUCTION_API_URL"
            check_not_placeholder_id "IOS_BUNDLE_ID_PRODUCTION" "$IOS_BUNDLE_ID_PRODUCTION"
            check_not_placeholder_id "ANDROID_PACKAGE_PRODUCTION" "$ANDROID_PACKAGE_PRODUCTION"
          fi

          if [ "$RUN_BUILD" = "true" ]; then
            check_not_empty "EXPO_TOKEN" "$EXPO_TOKEN"
            check_not_empty "EXPO_PROJECT_ID" "$EXPO_PROJECT_ID"
          fi

          echo "Preflight secret checks passed for target: $VALIDATE_TARGET"

      - name: Validate preview profile
        if: ${{ github.event.inputs.validate_target == 'preview' || github.event.inputs.validate_target == 'both' }}
        working-directory: mobile-release
        env:
          EXPO_PUBLIC_API_BASE_URL: ${{ secrets.RAILWAY_PREVIEW_API_URL }}
          APP_IOS_BUNDLE_IDENTIFIER: ${{ secrets.IOS_BUNDLE_ID_PREVIEW }}
          APP_ANDROID_PACKAGE: ${{ secrets.ANDROID_PACKAGE_PREVIEW }}
        run: npm run validate:release:preview

      - name: Validate production profile
        if: ${{ github.event.inputs.validate_target == 'production' || github.event.inputs.validate_target == 'both' }}
        working-directory: mobile-release
        env:
          EXPO_PUBLIC_API_BASE_URL: ${{ secrets.RAILWAY_PRODUCTION_API_URL }}
          APP_IOS_BUNDLE_IDENTIFIER: ${{ secrets.IOS_BUNDLE_ID_PRODUCTION }}
          APP_ANDROID_PACKAGE: ${{ secrets.ANDROID_PACKAGE_PRODUCTION }}
        run: npm run validate:release:production

      - name: Setup EAS CLI
        if: ${{ github.event.inputs.run_build == 'true' }}
        working-directory: mobile-release
        run: npm install -g eas-cli

      - name: Run EAS build
        if: ${{ github.event.inputs.run_build == 'true' }}
        working-directory: mobile-release
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PROJECT_ID: ${{ secrets.EXPO_PROJECT_ID }}
          EXPO_PUBLIC_API_BASE_URL: ${{ github.event.inputs.build_profile == 'preview' && secrets.RAILWAY_PREVIEW_API_URL || secrets.RAILWAY_PRODUCTION_API_URL }}
          APP_IOS_BUNDLE_IDENTIFIER: ${{ github.event.inputs.build_profile == 'preview' && secrets.IOS_BUNDLE_ID_PREVIEW || secrets.IOS_BUNDLE_ID_PRODUCTION }}
          APP_ANDROID_PACKAGE: ${{ github.event.inputs.build_profile == 'preview' && secrets.ANDROID_PACKAGE_PREVIEW || secrets.ANDROID_PACKAGE_PRODUCTION }}
        run: |
          if [ "${{ github.event.inputs.platform }}" = "all" ]; then
            eas build --non-interactive --platform all --profile "${{ github.event.inputs.build_profile }}"
          else
            eas build --non-interactive --platform "${{ github.event.inputs.platform }}" --profile "${{ github.event.inputs.build_profile }}"
          fi