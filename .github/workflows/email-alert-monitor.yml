name: Email Alert Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      canary:
        description: "Canary test: inject synthetic 401 counts above threshold to verify the alert email path without real Railway logs"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run 401 spike monitor
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE: weekly-tax-app
          RAILWAY_ENVIRONMENT: production
          LOOKBACK_MINUTES: "5"
          LOG_LINES: "800"
          LOGIN_401_THRESHOLD: "20"
          DOWNLOAD_401_THRESHOLD: "6"
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_FROM_EMAIL: ${{ secrets.ALERT_FROM_EMAIL }}
          ALERT_TO_EMAIL: ${{ secrets.ALERT_TO_EMAIL }}
          CANARY: ${{ github.event.inputs.canary || 'false' }}
        run: node ops/scripts/email-alert-monitor.js
